<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotation Makers</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .portal-container {
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 40px;
        }
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .portal-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background-color: #ecf0f1;
            color: var(--primary-color);
            padding: 30px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .portal-btn:hover {
            background-color: white;
            border-color: #3498db;
            color: #3498db;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }
        
        /* Mobile Responsiveness */
        @media screen and (max-width: 600px) {
            .button-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="portal-container">
    <h1>Quotation Makers</h1>
    <p>Select either module to generate a new quotation.</p>

    <div class="button-grid">
        <a href="new-tyres/index.html" class="portal-btn">
            New Tyres
        </a>

        <a href="retreads/index.html" class="portal-btn">
            Retreads
        </a>
    </div>
</div>

</body>
</html>
